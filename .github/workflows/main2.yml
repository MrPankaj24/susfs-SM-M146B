name: 🏗️ Build Kernel (s5e8535 / M14)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build Kernel (s5e8535 / M14)
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      # ─── 1. Checkout kernel source ───────────────────────────────────────────
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MrPankaj24/SM-M146B-Kernel-Source
          ref: main
          path: SM-M146B-Kernel-Source
          fetch-depth: 1

      # ─── 2. Cache apt packages ───────────────────────────────────────────────
      - name: 📦 Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-kernel-build-v1
          restore-keys: apt-${{ runner.os }}-

      # ─── 3. Install build dependencies ──────────────────────────────────────
      - name: 🔧 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git make bc bison flex \
            libssl-dev libelf-dev \
            binutils binutils-aarch64-linux-gnu \
            gcc gcc-aarch64-linux-gnu \
            g++ cpio zip unzip \
            curl wget \
            python3 python3-pip perl \
            libncurses-dev libncurses5-dev \
            cmake ninja-build \
            lld llvm clang \
            dwarves pahole \
            ccache \
            device-tree-compiler \
            xz-utils zlib1g-dev libc6-dev-i386
          echo "✅ All dependencies installed"

      # ─── 4. Print tool versions ──────────────────────────────────────────────
      - name: 🔍 Print Tool Versions
        run: |
          echo "=== Clang ==="
          clang --version
          echo "=== aarch64-linux-gnu-gcc ==="
          aarch64-linux-gnu-gcc --version
          echo "=== Make ==="
          make --version | head -1
          echo "=== Pahole ==="
          pahole --version
          echo "=== Python ==="
          python3 --version

      # ─── 5. Fix CONFIG_DEBUG_INFO_BTF (pahole version compatibility) ─────────
      - name: 🩹 Disable CONFIG_DEBUG_INFO_BTF (BTF build fix)
        working-directory: SM-M146B-Kernel-Source
        run: |
          # Fix the BTF/pahole error: "Failed to generate BTF for vmlinux"
          DEFCONFIG="arch/arm64/configs/s5e8535-m14xnsxx_defconfig"
          if [ -f "$DEFCONFIG" ]; then
            # Remove any existing BTF config lines
            sed -i '/CONFIG_DEBUG_INFO_BTF/d' "$DEFCONFIG"
            # Explicitly disable it
            echo "CONFIG_DEBUG_INFO_BTF=n" >> "$DEFCONFIG"
            echo "✅ CONFIG_DEBUG_INFO_BTF=n added to defconfig"
          else
            echo "⚠️  Defconfig not found at $DEFCONFIG, will patch .config after make defconfig"
          fi

      # ─── 6. Build the Kernel ─────────────────────────────────────────────────
      - name: 🔨 Build Kernel
        working-directory: SM-M146B-Kernel-Source
        env:
          PLATFORM_VERSION: "15"
          ANDROID_MAJOR_VERSION: "v"
          ARCH: arm64
          SUBARCH: arm64
          TARGET_SOC: s5e8535
          LLVM: "1"
          LLVM_IAS: "1"
          CROSS_COMPILE: aarch64-linux-gnu-
          CC: clang
          LD: ld.lld
          AR: llvm-ar
          NM: llvm-nm
          OBJCOPY: llvm-objcopy
          OBJDUMP: llvm-objdump
          STRIP: llvm-strip
          DEPMOD: depmod
          DTC_FLAGS: "-@"
        run: |
          set -e

          echo "========================================"
          echo " Building Samsung Galaxy M14 Kernel"
          echo " SoC  : s5e8535 (Exynos 1330)"
          echo " OS   : Android $PLATFORM_VERSION (One UI 7)"
          echo " Arch : $ARCH"
          echo " CC   : $(clang --version | head -1)"
          echo "========================================"

          # ── Generate .config from defconfig ──
          echo "→ Generating .config from s5e8535-m14xnsxx_defconfig..."
          make s5e8535-m14xnsxx_defconfig

          # ── Apply BTF fix in .config (belt-and-suspenders) ──
          echo "→ Patching .config: disabling CONFIG_DEBUG_INFO_BTF..."
          scripts/config --disable CONFIG_DEBUG_INFO_BTF 2>/dev/null || \
            sed -i 's/CONFIG_DEBUG_INFO_BTF=y/CONFIG_DEBUG_INFO_BTF=n/g' .config

          # Also ensure it's not set if not present
          grep -q "CONFIG_DEBUG_INFO_BTF" .config || echo "# CONFIG_DEBUG_INFO_BTF is not set" >> .config

          # ── Show final BTF config ──
          echo "→ BTF config status:"
          grep "CONFIG_DEBUG_INFO_BTF" .config || echo "  (not set)"

          # ── Build ──
          echo "→ Starting kernel build..."
          make -j$(nproc) \
            ARCH=$ARCH \
            SUBARCH=$SUBARCH \
            LLVM=1 \
            LLVM_IAS=1 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            PLATFORM_VERSION=$PLATFORM_VERSION \
            ANDROID_MAJOR_VERSION=$ANDROID_MAJOR_VERSION \
            TARGET_SOC=$TARGET_SOC \
            DEPMOD=depmod \
            DTC_FLAGS="-@" \
            2>&1 | tee ../build.log

          echo "✅ Kernel build completed!"

      # ─── 7. Verify output files ──────────────────────────────────────────────
      - name: ✅ Verify Build Output
        working-directory: SM-M146B-Kernel-Source
        run: |
          echo "=== Checking build outputs ==="
          if [ -f "arch/arm64/boot/Image" ]; then
            echo "✅ Image found: $(ls -lh arch/arm64/boot/Image)"
          else
            echo "❌ Image NOT found!"
            exit 1
          fi

          if [ -f "arch/arm64/boot/Image.gz" ]; then
            echo "✅ Image.gz found: $(ls -lh arch/arm64/boot/Image.gz)"
          fi

          # Check for DTS output
          if ls arch/arm64/boot/dts/exynos/s5e8535*.dtb 2>/dev/null; then
            echo "✅ DTB files found"
          fi

      # ─── 8. Upload kernel artifacts ──────────────────────────────────────────
      - name: 📤 Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: kernel-m14-android15-oneui7-${{ github.run_number }}
          path: |
            SM-M146B-Kernel-Source/arch/arm64/boot/Image
            SM-M146B-Kernel-Source/arch/arm64/boot/Image.gz
            SM-M146B-Kernel-Source/arch/arm64/boot/dts/exynos/s5e8535*.dtb
          retention-days: 30

      # ─── 9. Upload build log (always, for debugging) ─────────────────────────
      - name: 📋 Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
