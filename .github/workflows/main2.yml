name: 🔨 Build Kernel - SM-M146B (Android 15 / One UI 7)

on:
  # Trigger manually from Actions tab
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android Version (e.g. 15)'
        required: true
        default: '15'
      android_major_version:
        description: 'Android Major Version letter (e.g. v for Android 15)'
        required: true
        default: 'v'
  # Also trigger on push to main
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  build:
    name: 🏗️ Build Kernel (s5e8535 / M14)
    runs-on: ubuntu-22.04
    # Kernel builds can take a long time
    timeout-minutes: 120

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout kernel source
      # ─────────────────────────────────────────────
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MrPankaj24/SM-M146B-Kernel-Source
          ref: main
          path: SM-M146B-Kernel-Source
          fetch-depth: 1

      # ─────────────────────────────────────────────
      # 2. Install ALL required build dependencies
      #    (mirrors what Codespace had installed)
      # ─────────────────────────────────────────────
      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git \
            make \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            binutils \
            binutils-aarch64-linux-gnu \
            gcc \
            gcc-aarch64-linux-gnu \
            g++ \
            cpio \
            zip \
            unzip \
            curl \
            wget \
            python3 \
            python3-pip \
            perl \
            libncurses-dev \
            libncurses5-dev \
            cmake \
            ninja-build \
            lld \
            llvm \
            clang \
            dwarves \
            pahole \
            ccache \
            device-tree-compiler \
            xz-utils \
            zlib1g-dev \
            libc6-dev-i386

      # ─────────────────────────────────────────────
      # 3. Download Samsung/Android Toolchain
      #    (same clang-r450784d used in build_kernel.sh)
      # ─────────────────────────────────────────────
      - name: 🔧 Setup Android Clang Toolchain (clang-r450784d)
        working-directory: SM-M146B-Kernel-Source
        run: |
          mkdir -p toolchain/clang/host/linux-x86
          mkdir -p toolchain/build/kernel/build-tools
          mkdir -p toolchain/prebuilts/kernel-build-tools

          echo "⬇️ Downloading clang-r450784d..."
          wget -q --show-progress \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r450784d.tar.gz \
            -O /tmp/clang.tar.gz || \
          # Fallback: use GitHub mirror
          wget -q --show-progress \
            https://github.com/ZyCromerZ/Clang/releases/download/14.0.6-20220825-release/Clang-14.0.6-20220825.tar.gz \
            -O /tmp/clang.tar.gz

          echo "📦 Extracting clang..."
          mkdir -p toolchain/clang/host/linux-x86/clang-r450784d
          tar -xzf /tmp/clang.tar.gz -C toolchain/clang/host/linux-x86/clang-r450784d
          rm /tmp/clang.tar.gz

          echo "✅ Clang version:"
          toolchain/clang/host/linux-x86/clang-r450784d/bin/clang --version || true

      - name: 🔧 Setup Kernel Build Tools
        working-directory: SM-M146B-Kernel-Source
        run: |
          echo "⬇️ Downloading kernel build tools..."
          # Use prebuilt kernel build tools from AOSP
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/build-tools \
            toolchain/build/kernel/build-tools || \
          # Fallback: use system tools (already installed via apt)
          echo "⚠️ Using system build tools as fallback"

          git clone --depth=1 \
            https://android.googlesource.com/kernel/prebuilts/build-tools \
            toolchain/prebuilts/kernel-build-tools || \
          echo "⚠️ Using system kernel build tools as fallback"

      # ─────────────────────────────────────────────
      # 4. Setup ccache for faster rebuilds
      # ─────────────���───────────────────────────────
      - name: ⚡ Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-kernel-sm-m146b-${{ github.sha }}
          restore-keys: |
            ccache-kernel-sm-m146b-

      - name: ⚡ Configure ccache
        run: |
          ccache --max-size=5G
          ccache --zero-stats

      # ─────────────────────────────────────────────
      # 5. Build the Kernel
      # ─────────────────────────────────────────────
      - name: 🔨 Build Kernel (Android 15 / One UI 7)
        working-directory: SM-M146B-Kernel-Source
        env:
          ANDROID_VERSION: ${{ github.event.inputs.android_version || '15' }}
          ANDROID_MAJOR_LETTER: ${{ github.event.inputs.android_major_version || 'v' }}
        run: |
          # ── Toolchain paths (mirroring build_kernel.sh) ──
          export PATH=$(pwd)/toolchain/clang/host/linux-x86/clang-r450784d/bin:$PATH
          export PATH=$(pwd)/toolchain/build/kernel/build-tools/path/linux-x86:$PATH

          # Check if custom sysroot exists, else fallback to system
          if [ -d "$(pwd)/toolchain/build/kernel/build-tools/sysroot" ]; then
            export HOSTCFLAGS="--sysroot=$(pwd)/toolchain/build/kernel/build-tools/sysroot \
              -I$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/include"
            export HOSTLDFLAGS="--sysroot=$(pwd)/toolchain/build/kernel/build-tools/sysroot \
              -Wl,-rpath,$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 \
              -L$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 \
              -fuse-ld=lld --rtlib=compiler-rt"
          else
            echo "⚠️ Using system sysroot (custom sysroot not found)"
          fi

          # ── Android version exports ──
          export PLATFORM_VERSION=${ANDROID_VERSION}
          export ANDROID_MAJOR_VERSION=${ANDROID_MAJOR_LETTER}

          # ── Kernel build flags ──
          export DTC_FLAGS="-@"
          export LLVM=1
          export DEPMOD=depmod
          export ARCH=arm64
          export TARGET_SOC=s5e8535

          # ── Optional: enable ccache ──
          export CC="ccache clang"
          export CXX="ccache clang++"

          # ── Show tool versions ──
          echo "===== Build Environment ====="
          echo "PLATFORM_VERSION  = ${PLATFORM_VERSION}"
          echo "ANDROID_MAJOR     = ${ANDROID_MAJOR_VERSION}"
          echo "Clang version:"
          clang --version 2>/dev/null || echo "clang not in PATH"
          echo "Make version:"
          make --version | head -1
          echo "pahole version:"
          pahole --version 2>/dev/null || echo "pahole not found"
          echo "============================="

          # ── Generate .config from defconfig ──
          echo "📋 Generating .config from s5e8535-m14xnsxx_defconfig..."
          make ARCH=arm64 s5e8535-m14xnsxx_defconfig

          # ── Fix: disable BTF if pahole is not working ──
          if ! pahole --version &>/dev/null; then
            echo "⚠️ pahole not available — disabling CONFIG_DEBUG_INFO_BTF"
            scripts/config --file .config --disable CONFIG_DEBUG_INFO_BTF
            make ARCH=arm64 olddefconfig
          fi

          # ── Build kernel ──
          echo "🔨 Starting kernel build..."
          make ARCH=arm64 \
               LLVM=1 \
               -j$(nproc) \
               2>&1 | tee ../build.log

          echo "✅ Kernel build finished!"

      # ─────────────────────────────────────────────
      # 6. Collect output artifacts
      # ─────────────────────────────────────────────
      - name: 📦 Collect Kernel Artifacts
        if: success()
        working-directory: SM-M146B-Kernel-Source
        run: |
          mkdir -p ../output

          # Copy kernel image
          if [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image ../output/
            echo "✅ Image copied"
          fi

          if [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz ../output/
            echo "✅ Image.gz copied"
          fi

          # Copy DTBs
          if [ -f arch/arm64/boot/dts/exynos/s5e8535.dtb ]; then
            mkdir -p ../output/dtbs
            cp arch/arm64/boot/dts/exynos/s5e8535*.dtb ../output/dtbs/ 2>/dev/null || true
            echo "✅ DTBs copied"
          fi

          # Copy modules
          find . -name "*.ko" -exec cp {} ../output/ \; 2>/dev/null || true

          # Copy System.map and config
          cp System.map ../output/ 2>/dev/null || true
          cp .config ../output/kernel.config 2>/dev/null || true

          echo "===== Output files ====="
          ls -lh ../output/
          echo "======================="

      # ─────────────────────────────────────────────
      # 7. Upload artifacts
      # ─────────────────────────────────────────────
      - name: 📤 Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-SM-M146B-Android15-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: 📤 Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7

      # ─────────────────────────────────────────────
      # 8. Print ccache stats
      # ─────────────────────────────────────────────
      - name: 📊 ccache Stats
        if: always()
        run: ccache --show-stats
