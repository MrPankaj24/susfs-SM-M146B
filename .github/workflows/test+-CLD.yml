name: 🏗️ Build Kernel (cld ReSukiSU + SUSFS)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: 🏗️ Build s5e8535 / M14
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      SUSFS_BRANCH: "gki-android13-5.15"
      SUSFS_URL: "https://gitlab.com/simonpunk/susfs4ksu.git"
      CUSTOM_PATCH_URL: "https://raw.githubusercontent.com/MrPankaj24/susfs-SM-M146B/main/50_add_susfs_in_gki-android13-5.15.patch"
      CUSTOM_FRAG_URL: "https://raw.githubusercontent.com/MrPankaj24/susfs-SM-M146B/main/defconfig.fragment"

    steps:
      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MrPankaj24/SM-M146B-Kernel-Source
          ref: main
          fetch-depth: 1

      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget bc bison flex libssl-dev libelf-dev python3 python-is-python3 \
            make gcc gcc-aarch64-linux-gnu binutils binutils-aarch64-linux-gnu \
            g++ cpio zip unzip lz4 zstd xz-utils libncurses-dev libncurses5-dev \
            kmod rsync lld llvm clang dwarves pahole ccache device-tree-compiler \
            zlib1g-dev libc6-dev-i386 cmake ninja-build

      - name: 🔧 Cache Toolchains
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            toolchain/clang/host/linux-x86/clang-r450784d
            toolchain/build/kernel/build-tools
            toolchain/prebuilts/kernel-build-tools
          key: toolchain-clang-r450784d-v1

      - name: ⬇️ Download Clang r450784d (AOSP)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/clang/host/linux-x86/clang-r450784d
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz" -o /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C toolchain/clang/host/linux-x86/clang-r450784d
          rm /tmp/clang.tar.gz

      - name: ⬇️ Download Kernel Build Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b main https://android.googlesource.com/kernel/prebuilts/build-tools toolchain/build/kernel/build-tools
          mkdir -p toolchain/build/kernel/build-tools/path
          ln -sf $(pwd)/toolchain/build/kernel/build-tools/linux-x86 toolchain/build/kernel/build-tools/path/linux-x86

      - name: ⬇️ Download Prebuilt Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/prebuilts/build-tools toolchain/prebuilts/kernel-build-tools

      - name: 🥷 Clone SUSFS Repo
        run: |
          set -e
          rm -rf /tmp/susfs4ksu
          git clone --depth=1 --single-branch --branch "${SUSFS_BRANCH}" "${SUSFS_URL}" /tmp/susfs4ksu

      - name: ⬇️ Download Custom SUSFS Patch & Fragment
        run: |
          curl -LSs "${CUSTOM_PATCH_URL}" -o /tmp/custom_susfs.patch
          curl -LSs "${CUSTOM_FRAG_URL}" -o /tmp/defconfig.fragment

      - name: 🛡️ Inject ReSukiSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

      - name: 📁 Copy SUSFS source files
        run: |
          set -euo pipefail
          echo ">>> Copying core SUSFS source files..."
          cp -v /tmp/susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp -v /tmp/susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          cp -v /tmp/susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/ 2>/dev/null || true
          echo ">>> SUSFS source files copied"
          ls -la fs/susfs.c include/linux/susfs*.h

      - name: 🥷 Apply SUSFS patch
        run: |
          echo ">>> Applying SUSFS patch..."
          patch -p1 --forward < /tmp/custom_susfs.patch || {
            echo "⚠️ Some hunks failed, checking rejects..."
            find . -name "*.rej" -exec echo "REJECT: {}" \; -exec cat {} \;
            echo ">>> Continuing despite partial failures..."
          }

      - name: 🛠️ Fix SUSFS Integration
        run: |
          set -e

          echo ">>> Step 1: Fix susfs.h dependencies..."
          if [ -f include/linux/susfs.h ]; then
            grep -q '<linux/cred.h>' include/linux/susfs.h || \
              sed -i '1i\#include <linux/cred.h>' include/linux/susfs.h
            grep -q '<linux/stat.h>' include/linux/susfs.h || \
              sed -i '1i\#include <linux/stat.h>' include/linux/susfs.h
          fi

          echo ">>> Step 2: Inject susfs.h ONLY into patch-modified .c files..."
          PATCH_FILE="/tmp/custom_susfs.patch"
          grep '^diff --git' "$PATCH_FILE" | sed 's|.*b/||' | sort -u | while read -r file; do
            [ -f "$file" ] || continue
            echo "$file" | grep -q '\.c$' || continue
            if grep -q 'susfs_' "$file" && ! grep -q '<linux/susfs.h>' "$file"; then
              echo "  Injecting susfs.h into: $file"
              sed -i '0,/^#include/{/^#include/a\#include <linux/susfs.h>
              }' "$file"
            fi
          done || true

          echo ">>> Step 3: Inject SUSFS declarations into fs/namespace.c..."
          if ! grep -q 'DEFINE_IDA(susfs_mnt_id_ida)' fs/namespace.c; then
            printf '%s\n' \
              '' \
              '/* SUSFS namespace declarations */' \
              'DEFINE_IDA(susfs_mnt_id_ida);' \
              'DEFINE_IDA(susfs_mnt_group_ida);' \
              'extern bool susfs_is_sdcard_android_data_decrypted;' \
              'extern bool susfs_is_current_ksu_domain(void);' \
              '#ifndef CL_COPY_MNT_NS' \
              '#define CL_COPY_MNT_NS (1 << 25)' \
              '#endif' \
              > /tmp/susfs_ns_decl.c

            if grep -q 'static DEFINE_IDA(mnt_group_ida)' fs/namespace.c; then
              sed -i '/static DEFINE_IDA(mnt_group_ida)/r /tmp/susfs_ns_decl.c' fs/namespace.c
            else
              LAST_INC=$(grep -n '^#include' fs/namespace.c | tail -1 | cut -d: -f1)
              sed -i "${LAST_INC}r /tmp/susfs_ns_decl.c" fs/namespace.c
            fi
          fi

          echo ">>> Verification:"
          grep -n 'DEFINE_IDA(susfs_\|extern bool susfs_\|CL_COPY_MNT_NS' fs/namespace.c

      - name: 🔨 Compile Kernel
        run: |
          set -e
          set -o pipefail
          export PATH=$(pwd)/toolchain/clang/host/linux-x86/clang-r450784d/bin:$PATH
          export PATH=$(pwd)/toolchain/build/kernel/build-tools/path/linux-x86/:$PATH
          export HOSTCFLAGS="-I$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/include"
          export HOSTLDFLAGS="-Wl,-rpath,$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 -L$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/lib64 -fuse-ld=lld --rtlib=compiler-rt"
          export DTC_FLAGS="-@"
          export PLATFORM_VERSION=15
          export ANDROID_MAJOR_VERSION=v
          export LLVM=1
          export DEPMOD=depmod
          export ARCH=arm64
          export TARGET_SOC=s5e8535

          echo ">>> Generating Base Config..."
          make s5e8535-m14xnsxx_defconfig

          echo ">>> Injecting kernel config..."
          cat >> .config << 'EOF'
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_THREAD_INFO_IN_TASK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_UNICODE_FILTER=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          # Samsung security - disable all
          # CONFIG_DEFEX is not set
          # CONFIG_DEFEX_KERNEL_ONLY is not set
          # CONFIG_SECURITY_DEFEX is not set
          # CONFIG_FIVE is not set
          # CONFIG_FIVE_GKI is not set
          # CONFIG_PROCA is not set
          # CONFIG_GAF is not set
          CONFIG_KDP_CRED=n
          CONFIG_KDP_NS=n
          CONFIG_KDP_TEST=n
          CONFIG_RKP=n
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          EOF

          sed -i 's/^[[:space:]]*//' .config

          make olddefconfig

          echo ">>> Config verification:"
          grep -E "CONFIG_KSU|CONFIG_DEFEX|CONFIG_KDP|CONFIG_RKP|CONFIG_UH|CONFIG_PROCA|CONFIG_FIVE" .config || true

          echo ">>> Compiling ($(nproc) threads)..."
          make -j$(nproc) 2>&1 | tee /tmp/kernel_build.log

      - name: 📦 Package with AnyKernel3
        if: success()
        run: |
          set -e
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git /tmp/AnyKernel3
          rm -rf /tmp/AnyKernel3/.git /tmp/AnyKernel3/modules /tmp/AnyKernel3/patch
          rm -f /tmp/AnyKernel3/ramdisk/fstab.* 2>/dev/null || true

          cat > /tmp/AnyKernel3/anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          properties() { '
          kernel.string=ReSukiSU+SUSFS for SM-M146B
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=m14x
          device.name2=m14xns
          device.name3=SM-M146B
          device.name4=s5e8535
          supported.versions=13-15
          supported.patchlevels=
          '; }

          block=/dev/block/by-name/boot;
          is_slot_device=0;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;

          . tools/ak3-core.sh;
          dump_boot;
          write_boot;
          AKEOF

          # Remove leading spaces from anykernel.sh
          sed -i 's/^[[:space:]]*//' /tmp/AnyKernel3/anykernel.sh

          if [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image /tmp/AnyKernel3/
            echo ">>> Copied Image"
          elif [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz /tmp/AnyKernel3/
            echo ">>> Copied Image.gz"
          else
            echo "❌ No kernel image found!"
            exit 1
          fi

          # Copy DTBs if present
          if [ -d arch/arm64/boot/dts/exynos ]; then
            find arch/arm64/boot/dts/exynos -name "*.dtb" | head -20 | while read dtb; do
              cp "$dtb" /tmp/AnyKernel3/ 2>/dev/null || true
            done
          fi

          cd /tmp/AnyKernel3
          zip -r9 /tmp/ReSukiSU-SUSFS-M14x-kernel.zip * -x '*.git*'

          mkdir -p ${GITHUB_WORKSPACE}/out
          cp /tmp/ReSukiSU-SUSFS-M14x-kernel.zip ${GITHUB_WORKSPACE}/out/
          echo ">>> Flashable zip created!"
          ls -lh /tmp/ReSukiSU-SUSFS-M14x-kernel.zip

      - name: ⬆️ Upload Flashable Kernel Zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-SUSFS-M14x-kernel
          path: out/ReSukiSU-SUSFS-M14x-kernel.zip
          retention-days: 30

      - name: ⬆️ Upload Raw Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-raw
          path: |
            arch/arm64/boot/Image
            arch/arm64/boot/Image.gz
          retention-days: 30

      - name: ⬆️ Upload Build Log (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: /tmp/kernel_build.log
          retention-days: 7
